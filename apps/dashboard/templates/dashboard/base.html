{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}منجز Branch AI{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
    /* No-FOUC theme init */
    (function(){
        try {
            var t = localStorage.getItem('munjiz-theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        } catch(e) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}?v={% now 'U' %}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'tajawal': ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        'munjiz-bg': '#0A0A14',
                        'munjiz-card': '#14142A',
                        'munjiz-border': '#252545',
                        'munjiz-text': '#E8E8F0',
                        'munjiz-muted': '#8A8AA8',
                        'agent-orchestrator': '#00C853',
                        'agent-customer': '#2979FF',
                        'agent-queue': '#AA00FF',
                        'agent-operations': '#FF6D00',
                        'agent-analytics': '#FF1744',
                    },
                },
            },
        };
    </script>
</head>
<body class="font-tajawal bg-munjiz-bg text-munjiz-text min-h-screen overflow-x-hidden">
    {% block content %}{% endblock %}

    <script src="{% static 'js/websocket.js' %}?v={% now 'U' %}"></script>
    <script src="{% static 'js/dashboard.js' %}?v={% now 'U' %}"></script>
    <script src="{% static 'js/metrics.js' %}?v={% now 'U' %}"></script>
    <script src="{% static 'js/network.js' %}?v={% now 'U' %}"></script>
</body>
</html>
