<!-- Data editor — the WOW moment (editorial style) -->
<div style="background:var(--card);border:1px solid var(--gold-dim);border-radius:14px;overflow:hidden;">
    <button @click="dataEditorOpen = !dataEditorOpen"
            class="w-full flex items-center justify-between transition-colors"
            style="padding:1rem 1.25rem;">
        <div class="flex flex-col items-start gap-0.5">
            <span class="eyebrow" style="color:var(--gold);">محرر البيانات · للحكام</span>
            <span style="font-family:var(--display);font-size:0.85rem;color:var(--ink);font-weight:500;">اختبر الذكاء الحقيقي</span>
        </div>
        <span style="color:var(--gold);font-family:var(--mono);font-size:0.8rem;transition:transform 0.3s;" :class="dataEditorOpen ? 'rotate-180' : ''">▾</span>
    </button>

    <div x-show="dataEditorOpen" x-transition style="padding:1rem 1.25rem 1.25rem;border-top:1px solid var(--hairline);">
        <p style="font-family:var(--display);font-size:0.78rem;color:var(--body-color);line-height:1.6;margin-bottom:1rem;">
            غيّر الأرقام وشغّل سيناريو — ستلاحظ أن الوكلاء يعيدون تحليلهم بالأرقام الجديدة لحظياً. <strong style="color:var(--gold);">هذا يثبت أن الذكاء حقيقي.</strong>
        </p>

        <div class="data-editor-fields">
            <div class="field-row">
                <label>عدد العملاء بالانتظار</label>
                <input type="number" x-model.number="customData.queue_state.total_waiting"/>
            </div>
            <div class="field-row">
                <label>متوسط الانتظار (دقيقة)</label>
                <input type="number" step="0.5" x-model.number="customData.queue_state.avg_wait_minutes"/>
            </div>
            <div class="field-row">
                <label>الالتزام بـ SLA (٪)</label>
                <input type="number" x-model.number="customData.queue_state.sla_compliance"/>
            </div>
            <div class="field-row">
                <label>سياق اليوم</label>
                <select x-model="customData.day_context">
                    <option>خميس — نهاية الشهر — يوم رواتب</option>
                    <option>اثنين — هادئ</option>
                    <option>جمعة — بعد صلاة الجمعة</option>
                    <option>رمضان — بعد الإفطار</option>
                </select>
            </div>
            <div class="field-row">
                <label>السيناريو</label>
                <select x-model="customData.scenario_id">
                    {% for s in scenarios %}
                    <option value="{{ s.scenario_id }}">{{ s.scenario_id }} — {{ s.name_ar }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button @click="triggerWithCustomData()"
                :disabled="isPlaying"
                class="w-full transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                style="margin-top:1rem;background:#00C853;color:#0A0A14;font-weight:700;padding:0.85rem;border-radius:10px;font-family:var(--display);font-size:0.95rem;">
            شغّل الوكلاء على البيانات الجديدة ←
        </button>
    </div>
</div>

<style>
.data-editor-fields { display:flex; flex-direction:column; gap:0.85rem; }
.field-row { display:flex; flex-direction:column; gap:0.35rem; }
.field-row label { font-family:var(--mono); font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; direction:ltr; text-align:right; }
.field-row input, .field-row select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    color: var(--ink);
    font-family: var(--body-font);
    font-size: 0.9rem;
    text-align: right;
    transition: border-color 0.2s, background 0.2s;
}
.field-row input:focus, .field-row select:focus {
    outline: none;
    border-color: #00C853;
    background: var(--card-2);
}
</style>
