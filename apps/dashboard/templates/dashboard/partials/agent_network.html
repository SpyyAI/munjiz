<!-- Agent network (editorial) -->
<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1rem;">
    <div class="flex items-center justify-between mb-3">
        <span class="eyebrow">شبكة الوكلاء</span>
        <span style="font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;" x-text="lastFlow ? `↳ ${lastFlow}` : 'IDLE'"></span>
    </div>

    <!-- Heterogeneous architecture legend -->
    <div style="background:rgba(10,10,20,0.4);border:1px solid var(--hairline);border-radius:8px;padding:0.65rem 0.75rem;margin-bottom:0.85rem;">
        <div class="eyebrow" style="margin-bottom:0.55rem;color:var(--gold);">🧠 المعمارية متعددة النماذج</div>
        <div style="display:flex;flex-direction:column;gap:0.35rem;">
            {% for agent in agents %}
            <div class="flex items-center justify-between" style="font-size:0.7rem;">
                <span class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full" style="background: {{ agent.color }};"></span>
                    <span style="font-family:var(--display);color:var(--body-color);">{{ agent.name_ar }}</span>
                </span>
                <span style="font-family:var(--mono);font-size:0.62rem;font-weight:600;color: {{ agent.color }};direction:ltr;letter-spacing:0.02em;">{{ agent.model_label }}</span>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="relative" style="height:200px;">
        <svg id="agent-network-svg" viewBox="0 0 280 200" class="w-full h-full" style="overflow:visible;">
            <defs>
                <radialGradient id="dashCenterGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%"  stop-color="#00C853" stop-opacity="0.16"/>
                    <stop offset="100%" stop-color="#00C853" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <circle cx="140" cy="100" r="80" fill="url(#dashCenterGlow)"/>

            <!-- Faint K4 ambient mesh -->
            <g stroke="rgba(255,255,255,0.06)" stroke-width="0.6" fill="none">
                <line x1="50" y1="40"  x2="230" y2="40"/>
                <line x1="50" y1="40"  x2="50"  y2="160"/>
                <line x1="50" y1="40"  x2="230" y2="160"/>
                <line x1="230" y1="40" x2="50"  y2="160"/>
                <line x1="230" y1="40" x2="230" y2="160"/>
                <line x1="50" y1="160" x2="230" y2="160"/>
            </g>

            <!-- Concentric guide -->
            <circle cx="140" cy="100" r="50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8" stroke-dasharray="2 5"/>

            <g id="network-edges">
                <line x1="140" y1="100" x2="50"  y2="40"  data-from="analytics"   stroke="#FF1744" stroke-width="1" opacity="0.35"/>
                <line x1="140" y1="100" x2="230" y2="40"  data-from="operations"  stroke="#FF6D00" stroke-width="1" opacity="0.35"/>
                <line x1="140" y1="100" x2="50"  y2="160" data-from="customer"    stroke="#2979FF" stroke-width="1" opacity="0.35"/>
                <line x1="140" y1="100" x2="230" y2="160" data-from="queue"       stroke="#AA00FF" stroke-width="1" opacity="0.35"/>
            </g>

            <g>
                <circle cx="50"  cy="40"  r="14" fill="#FF1744" data-agent="analytics"/>
                <circle cx="50"  cy="40"  r="5"  fill="rgba(255,255,255,0.35)" pointer-events="none"/>

                <circle cx="230" cy="40"  r="14" fill="#FF6D00" data-agent="operations"/>
                <circle cx="230" cy="40"  r="5"  fill="rgba(255,255,255,0.35)" pointer-events="none"/>

                <circle cx="50"  cy="160" r="14" fill="#2979FF" data-agent="customer"/>
                <circle cx="50"  cy="160" r="5"  fill="rgba(255,255,255,0.35)" pointer-events="none"/>

                <circle cx="230" cy="160" r="14" fill="#AA00FF" data-agent="queue"/>
                <circle cx="230" cy="160" r="5"  fill="rgba(255,255,255,0.35)" pointer-events="none"/>

                <circle cx="140" cy="100" r="20" fill="#00C853" data-agent="orchestrator"/>
                <circle cx="140" cy="100" r="8"  fill="rgba(255,255,255,0.4)" pointer-events="none"/>
            </g>
        </svg>
    </div>
</div>
