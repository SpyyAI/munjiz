<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#10362e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#00e5a0"/>
    </marker>
    <style>
      .title { font: 800 44px Arial, sans-serif; fill: #f5f7fb; }
      .sub { font: 500 22px Arial, sans-serif; fill: #93a4ba; }
      .box { fill: #17243a; stroke: #28415e; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .role { fill: #20314c; stroke: #00e5a0; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .decision { fill: #183d33; stroke: #17ffff; stroke-width: 2; filter: url(#shadow); }
      .end { fill: #0b5a43; stroke: #00e5a0; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .label { font: 700 24px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .small { font: 500 17px Arial, sans-serif; fill: #aebbd0; text-anchor: middle; }
      .tag { font: 700 15px Arial, sans-serif; fill: #00e5a0; text-anchor: middle; letter-spacing: 1px; }
      .line { fill: none; stroke: #00e5a0; stroke-width: 3; marker-end: url(#arrow); }
      .muted-line { fill: none; stroke: #60718b; stroke-width: 2.5; marker-end: url(#arrow); }
      .route { font: 700 17px Arial, sans-serif; fill: #17ffff; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="1570" cy="150" r="210" fill="#00e5a0" opacity="0.06"/>
  <circle cx="160" cy="1060" r="260" fill="#17ffff" opacity="0.05"/>

  <text x="900" y="70" class="title" text-anchor="middle">Saudi Bank Branch AS-IS Process</text>
  <text x="900" y="108" class="sub" text-anchor="middle">Employee roles and customer journey inside a typical branch</text>

  <!-- Top flow -->
  <rect x="80" y="170" width="260" height="105" class="box"/>
  <text x="210" y="210" class="tag">START</text>
  <text x="210" y="240" class="label">Customer Enters</text>
  <text x="210" y="264" class="small">Branch visit begins</text>

  <rect x="420" y="170" width="260" height="105" class="role"/>
  <text x="550" y="210" class="tag">FRONT DOOR</text>
  <text x="550" y="240" class="label">Security Guard</text>
  <text x="550" y="264" class="small">Entry and safety control</text>

  <rect x="760" y="170" width="300" height="105" class="role"/>
  <text x="910" y="210" class="tag">QUEUE</text>
  <text x="910" y="240" class="label">Floor Coordinator</text>
  <text x="910" y="264" class="small">Guides customer and issues ticket</text>

  <polygon points="1240,160 1425,222 1240,284 1055,222" class="decision"/>
  <text x="1240" y="213" class="label">Request Type?</text>
  <text x="1240" y="242" class="small">Route to right employee</text>

  <path d="M340 222 H420" class="line"/>
  <path d="M680 222 H760" class="line"/>
  <path d="M1060 222 H1055" class="line"/>

  <!-- Service roles -->
  <rect x="80" y="405" width="300" height="115" class="role"/>
  <text x="230" y="442" class="tag">CASH</text>
  <text x="230" y="474" class="label">Teller / Cashier</text>
  <text x="230" y="500" class="small">Deposits, withdrawals, cheques</text>

  <rect x="520" y="405" width="320" height="115" class="role"/>
  <text x="680" y="442" class="tag">NON-CASH</text>
  <text x="680" y="474" class="label">Customer Service Officer</text>
  <text x="680" y="500" class="small">Accounts, cards, inquiries</text>

  <rect x="960" y="405" width="300" height="115" class="role"/>
  <text x="1110" y="442" class="tag">HIGH VALUE</text>
  <text x="1110" y="474" class="label">Relationship Manager</text>
  <text x="1110" y="500" class="small">VIP, SME, financing requests</text>

  <rect x="1400" y="405" width="300" height="115" class="role"/>
  <text x="1550" y="442" class="tag">SELF-SERVICE</text>
  <text x="1550" y="474" class="label">Digital Banking Support</text>
  <text x="1550" y="500" class="small">ATM, kiosk, mobile app help</text>

  <path d="M1215 279 C1120 340 410 330 230 405" class="line"/>
  <text x="500" y="345" class="route">Cash transaction</text>
  <path d="M1230 285 C1160 350 780 340 680 405" class="line"/>
  <text x="780" y="366" class="route">Account / card / inquiry</text>
  <path d="M1250 285 C1260 350 1140 340 1110 405" class="line"/>
  <text x="1210" y="366" class="route">VIP / SME / finance</text>
  <path d="M1310 275 C1440 330 1540 340 1550 405" class="line"/>
  <text x="1505" y="345" class="route">Digital help</text>

  <!-- Approval decision -->
  <polygon points="900,610 1090,680 900,750 710,680" class="decision"/>
  <text x="900" y="670" class="label">Needs Approval?</text>
  <text x="900" y="700" class="small">Exception, limit, or override</text>

  <path d="M230 520 C250 610 690 610 780 660" class="line"/>
  <path d="M680 520 C690 600 760 630 805 650" class="line"/>
  <path d="M1110 520 C1080 600 1020 630 995 650" class="line"/>
  <path d="M1550 520 C1450 625 1120 610 1015 660" class="line"/>

  <!-- Cash vault side -->
  <rect x="80" y="650" width="300" height="110" class="role"/>
  <text x="230" y="687" class="tag">CASH CONTROL</text>
  <text x="230" y="718" class="label">Head Teller / Cash Vault</text>
  <text x="230" y="744" class="small">Vault limits and cash balancing</text>
  <path d="M230 520 V650" class="muted-line"/>

  <!-- Approval path -->
  <rect x="1180" y="625" width="330" height="115" class="role"/>
  <text x="1345" y="662" class="tag">APPROVAL</text>
  <text x="1345" y="694" class="label">Operations Supervisor</text>
  <text x="1345" y="720" class="small">or Branch Manager</text>

  <path d="M1090 680 H1180" class="line"/>
  <text x="1136" y="657" class="route">Yes</text>

  <rect x="520" y="840" width="330" height="115" class="end"/>
  <text x="685" y="880" class="tag">NO APPROVAL</text>
  <text x="685" y="912" class="label">Service Completed</text>
  <text x="685" y="938" class="small">Customer request is finished</text>
  <path d="M790 725 C690 765 675 805 685 840" class="line"/>
  <text x="720" y="780" class="route">No</text>

  <!-- Compliance -->
  <polygon points="1345,825 1540,895 1345,965 1150,895" class="decision"/>
  <text x="1345" y="884" class="label">Risk / Compliance?</text>
  <text x="1345" y="914" class="small">KYC, AML, suspicious case</text>
  <path d="M1345 740 V825" class="line"/>

  <rect x="1420" y="1030" width="300" height="105" class="role"/>
  <text x="1570" y="1068" class="tag">CONTROL</text>
  <text x="1570" y="1098" class="label">Compliance / Risk Officer</text>
  <text x="1570" y="1122" class="small">Reviews sensitive cases</text>
  <path d="M1465 945 C1550 970 1570 995 1570 1030" class="line"/>
  <text x="1535" y="986" class="route">Yes</text>

  <!-- Back office -->
  <rect x="960" y="1030" width="300" height="105" class="role"/>
  <text x="1110" y="1068" class="tag">PROCESSING</text>
  <text x="1110" y="1098" class="label">Back Office Staff</text>
  <text x="1110" y="1122" class="small">Documentation and follow-up</text>
  <path d="M1250 945 C1175 985 1110 1000 1110 1030" class="line"/>
  <text x="1195" y="986" class="route">No / after review</text>
  <path d="M1420 1082 H1260" class="line"/>

  <rect x="520" y="1030" width="330" height="105" class="end"/>
  <text x="685" y="1068" class="tag">END</text>
  <text x="685" y="1098" class="label">Customer Leaves Branch</text>
  <text x="685" y="1122" class="small">Service closed or follow-up scheduled</text>

  <path d="M960 1082 H850" class="line"/>
  <path d="M685 955 V1030" class="line"/>
</svg>
